document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 transform: scale(1.06); } 100% { transform: scale(1); opacity: 1; } }\n    .p2-btn { transition: border-color .18s cubic-bezier(.2,.6,.2,1), background .18s, transform .12s, color .18s; }\n    .p2-scene::-webkit-scrollbar, .p2-panel::-webkit-scrollbar { width: 8px; }\n    .p2-panel::-webkit-scrollbar-thumb { background: #143350; border-radius: 8px; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"position:fixed; inset:0; display:flex; font-family:'Sora',system-ui,sans-serif; background:radial-gradient(120% 90% at 30% 18%, #013049 0%, #001520 60%, #000d15 100%); color:#EAF6FF;\">\n\n  <!-- ===== Stage ===== -->\n  <div style=\"position:relative; flex:1; min-width:0; display:flex; flex-direction:column;\">\n\n    <div style=\"position:absolute; top:28px; left:32px; z-index:5; pointer-events:none;\">\n      <div style=\"font-family:'Manrope',sans-serif; font-weight:600; font-size:12px; letter-spacing:0.2em; color:#16A3D6;\">Interactive<\u002Fdiv>\n      <h1 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:34px; letter-spacing:-0.03em; color:#EAF6FF; margin-top:4px; line-height:1;\">Rubik’s Cube<\u002Fh1>\n    <\u002Fdiv>\n\n    <div class=\"p2-scene\" ref=\"{{ setSceneEl }}\" style=\"flex:1; position:relative; perspective:1200px; touch-action:none; cursor:grab; overflow:hidden;\"><\u002Fdiv>\n\n    <div style=\"position:absolute; bottom:24px; left:0; right:0; z-index:5; pointer-events:none; text-align:center; font-size:13px; color:#6f94aa; letter-spacing:.01em;\">\n      Drag a face to turn that layer · drag the background to orbit · arrow keys <b style=\"color:#9AE4FF; font-weight:600;\">roll &amp; spin<\u002Fb> the whole cube\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Control panel ===== -->\n  <div class=\"p2-panel\" style=\"width:344px; flex:none; background:#03202f; border-left:1px solid #143350; padding:26px 24px 30px; overflow-y:auto; display:flex; flex-direction:column; gap:22px;\">\n\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between;\">\n      <div style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:21px; letter-spacing:-0.02em; color:#EAF6FF;\">Phase2<span style=\"color:#16A3D6;\">_<\u002Fspan><\u002Fdiv>\n      <span style=\"font-size:11px; letter-spacing:.16em; color:#5f829a; font-family:'Manrope',sans-serif; font-weight:600;\">CUBE LAB<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Stats -->\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n      <div style=\"background:#04293b; border:1px solid #143350; border-radius:12px; padding:14px 16px;\">\n        <div style=\"font-size:10px; letter-spacing:.18em; color:#5f829a; font-family:'Manrope',sans-serif; font-weight:600;\">TIME<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:26px; color:#EAF6FF; margin-top:4px; font-variant-numeric:tabular-nums;\">{{ timeText }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#04293b; border:1px solid #143350; border-radius:12px; padding:14px 16px;\">\n        <div style=\"font-size:10px; letter-spacing:.18em; color:#5f829a; font-family:'Manrope',sans-serif; font-weight:600;\">MOVES<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:26px; color:#EAF6FF; margin-top:4px; font-variant-numeric:tabular-nums;\">{{ moveCount }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; align-items:center; gap:9px; padding:10px 14px; background:{{ statusBg }}; border:1px solid {{ statusBorder }}; border-radius:10px;\">\n      <span style=\"width:8px; height:8px; border-radius:50%; background:{{ statusColor }}; box-shadow:0 0 10px {{ statusColor }};\"><\u002Fspan>\n      <span style=\"font-size:13.5px; font-weight:500; color:{{ statusColor }};\">{{ statusLabel }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Primary actions -->\n    <div style=\"display:flex; gap:10px;\">\n      <button class=\"p2-btn\" onclick=\"{{ scramble }}\" style=\"flex:1; cursor:pointer; border:none; border-radius:10px; padding:13px 0; background:#F5543A; color:#fff; font-family:'Manrope',sans-serif; font-weight:700; font-size:14px; letter-spacing:.01em;\" style-hover=\"background:#ff6a51; transform:translateY(-1px);\">Scramble<\u002Fbutton>\n      <button class=\"p2-btn\" onclick=\"{{ reset }}\" style=\"flex:1; cursor:pointer; border:1px solid #1d4763; border-radius:10px; padding:13px 0; background:transparent; color:#cfe6f3; font-family:'Manrope',sans-serif; font-weight:600; font-size:14px;\" style-hover=\"border-color:#16A3D6; color:#fff;\">Reset<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Rotate cube -->\n    <div>\n      <div style=\"font-family:'Manrope',sans-serif; font-weight:600; font-size:12px; letter-spacing:.16em; color:#6f94aa; margin-bottom:5px;\">ROTATE CUBE<\u002Fdiv>\n      <div style=\"font-size:12.5px; color:#5f829a; margin-bottom:13px; line-height:1.45;\">Re-orient the whole cube to bring any face to the top.<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:9px;\">\n        <button class=\"p2-btn\" onclick=\"{{ rollUp }}\" style=\"cursor:pointer; border:1px solid #1d4763; border-radius:9px; padding:13px 0; background:rgba(255,255,255,.03); color:#EAF6FF; font-family:'Manrope',sans-serif; font-weight:600; font-size:14px;\" style-hover=\"border-color:#16A3D6; background:rgba(22,163,214,.12);\">Roll up<\u002Fbutton>\n        <button class=\"p2-btn\" onclick=\"{{ rollDown }}\" style=\"cursor:pointer; border:1px solid #1d4763; border-radius:9px; padding:13px 0; background:rgba(255,255,255,.03); color:#EAF6FF; font-family:'Manrope',sans-serif; font-weight:600; font-size:14px;\" style-hover=\"border-color:#16A3D6; background:rgba(22,163,214,.12);\">Roll down<\u002Fbutton>\n        <button class=\"p2-btn\" onclick=\"{{ spinLeft }}\" style=\"cursor:pointer; border:1px solid #1d4763; border-radius:9px; padding:13px 0; background:rgba(255,255,255,.03); color:#EAF6FF; font-family:'Manrope',sans-serif; font-weight:600; font-size:14px;\" style-hover=\"border-color:#16A3D6; background:rgba(22,163,214,.12);\">Spin left<\u002Fbutton>\n        <button class=\"p2-btn\" onclick=\"{{ spinRight }}\" style=\"cursor:pointer; border:1px solid #1d4763; border-radius:9px; padding:13px 0; background:rgba(255,255,255,.03); color:#EAF6FF; font-family:'Manrope',sans-serif; font-weight:600; font-size:14px;\" style-hover=\"border-color:#16A3D6; background:rgba(22,163,214,.12);\">Spin right<\u002Fbutton>\n      <\u002Fdiv>\n      <button class=\"p2-btn\" onclick=\"{{ resetView }}\" style=\"width:100%; margin-top:9px; cursor:pointer; border:1px solid #1d4763; border-radius:9px; padding:11px 0; background:transparent; color:#6f94aa; font-family:'Sora',sans-serif; font-size:12.5px;\" style-hover=\"border-color:#16A3D6; color:#cfe6f3;\">Recenter view<\u002Fbutton>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = { moveCount: 0, elapsed: 0, status: \"ready\" };\n    this.inited = false;\n    this.queue = [];\n    this.animating = false;\n    this.running = false;\n    this.hasScrambled = false;\n    this.yaw = -34; this.pitch = -22;\n    this.setSceneEl = (el) => { this.sceneEl = el; this.tryInit(); };\n\n    // sticker colours\n    this.COLORS = { W: \"#F4F4F0\", Y: \"#FFD23F\", R: \"#D2293B\", O: \"#FF6B1A\", B: \"#1761C9\", G: \"#1FA85B\" };\n    this.DIRS = [\"front\", \"back\", \"right\", \"left\", \"top\", \"bottom\"];\n\n    // geometry\n    this.S = 58; this.HALF = 29; this.UNIT = 63;\n\n    // calibration signs (flip if a turn animates the wrong way)\n    this.ANIM_SIGN = { X: 1, Y: -1, Z: 1 };    // per CSS rotation axis used for the group\n    this.CW_SIGN = { X: -1, Y: -1, Z: 1 };     // drag: which rotation-axis sign == clockwise\n\n    // notation -> { posAxis, layer, cw, ccw, cssAxis }\n    this.MOVES = {\n      U: { posAxis: \"Z\", layer: 0, cw: \"rotateTopCW\",    ccw: \"rotateTopCCW\",    cssAxis: \"Y\" },\n      E: { posAxis: \"Z\", layer: 1, cw: \"rotateXMidCW\",   ccw: \"rotateXMidCCW\",   cssAxis: \"Y\" },\n      D: { posAxis: \"Z\", layer: 2, cw: \"rotateBottomCW\", ccw: \"rotateBottomCCW\", cssAxis: \"Y\" },\n      L: { posAxis: \"X\", layer: 0, cw: \"rotateLeftCW\",   ccw: \"rotateLeftCCW\",   cssAxis: \"X\" },\n      M: { posAxis: \"X\", layer: 1, cw: \"rotateYMidCW\",   ccw: \"rotateYMidCCW\",   cssAxis: \"X\" },\n      R: { posAxis: \"X\", layer: 2, cw: \"rotateRightCW\",  ccw: \"rotateRightCCW\",  cssAxis: \"X\" },\n      B: { posAxis: \"Y\", layer: 0, cw: \"rotateBackCW\",   ccw: \"rotateBackCCW\",   cssAxis: \"Z\" },\n      S: { posAxis: \"Y\", layer: 1, cw: \"rotateZMidCW\",   ccw: \"rotateZMidCCW\",   cssAxis: \"Z\" },\n      F: { posAxis: \"Y\", layer: 2, cw: \"rotateFrontCW\",  ccw: \"rotateFrontCCW\",  cssAxis: \"Z\" }\n    };\n\n    this.NORMALS = {\n      right:  { X: 1, Y: 0, Z: 0 },  left:   { X: -1, Y: 0, Z: 0 },\n      top:    { X: 0, Y: 0, Z: -1 }, bottom: { X: 0, Y: 0, Z: 1 },\n      front:  { X: 0, Y: 1, Z: 0 },  back:   { X: 0, Y: -1, Z: 0 }\n    };\n\n    // whole-cube re-orientation -> engine rotateCube + matching world animation\n    this.CUBE_MOVES = {\n      spinLeft:  { rotation: \"XCW\",  axis: \"Y\", angle: -90 },\n      spinRight: { rotation: \"XCCW\", axis: \"Y\", angle: 90 },\n      rollUp:    { rotation: \"YCW\",  axis: \"X\", angle: 90 },\n      rollDown:  { rotation: \"YCCW\", axis: \"X\", angle: -90 }\n    };\n  }\n\n  componentDidMount() { this.tryInit(); window.addEventListener(\"keydown\", this._onKey = (e) => this.onKey(e)); }\n  componentWillUnmount() { if (this.timer) clearInterval(this.timer); window.removeEventListener(\"keydown\", this._onKey); }\n\n  tryInit() {\n    if (this.inited) return;\n    if (this.sceneEl && window.CubeEngine) this.init();\n    else requestAnimationFrame(() => this.tryInit());\n  }\n\n  init() {\n    this.inited = true;\n    this.rubiks = new window.CubeEngine.RubiksCube();\n\n    this.worldEl = document.createElement(\"div\");\n    this.worldEl.style.cssText = \"position:absolute; left:50%; top:50%; width:0; height:0; transform-style:preserve-3d; will-change:transform;\";\n    this.sceneEl.appendChild(this.worldEl);\n\n    this.entries = this.rubiks.cubes.map((c) => this.createCubie(c));\n    this.entries.forEach((e) => this.worldEl.appendChild(e.el));\n\n    this.applyView(false);\n    this.renderCube();\n\n    // pointer interaction\n    const sc = this.sceneEl;\n    sc.addEventListener(\"pointerdown\", (e) => this.onDown(e));\n    sc.addEventListener(\"pointermove\", (e) => this.onMove(e));\n    sc.addEventListener(\"pointerup\", (e) => this.onUp(e));\n    sc.addEventListener(\"pointercancel\", (e) => this.onUp(e));\n  }\n\n  createCubie(cube) {\n    const S = this.S, H = this.HALF;\n    const el = document.createElement(\"div\");\n    el.style.cssText = \"position:absolute; left:0; top:0; width:\" + S + \"px; height:\" + S + \"px; transform-style:preserve-3d;\";\n    const faceTf = {\n      front:  \"translateZ(\" + H + \"px)\",\n      back:   \"rotateY(180deg) translateZ(\" + H + \"px)\",\n      right:  \"rotateY(90deg) translateZ(\" + H + \"px)\",\n      left:   \"rotateY(-90deg) translateZ(\" + H + \"px)\",\n      top:    \"rotateX(90deg) translateZ(\" + H + \"px)\",\n      bottom: \"rotateX(-90deg) translateZ(\" + H + \"px)\"\n    };\n    const stickers = {};\n    this.DIRS.forEach((dir) => {\n      const face = document.createElement(\"div\");\n      face.className = \"face\";\n      face.dataset.dir = dir;\n      face.__entry = null; // set below\n      face.style.cssText = \"position:absolute; left:0; top:0; width:\" + S + \"px; height:\" + S + \"px; background:#080c10; border-radius:9px; transform:\" + faceTf[dir] + \"; -webkit-backface-visibility:hidden; backface-visibility:hidden;\";\n      const st = document.createElement(\"div\");\n      st.style.cssText = \"position:absolute; inset:5px; border-radius:7px; box-shadow: inset 0 2px 5px rgba(255,255,255,.22), inset 0 -3px 6px rgba(0,0,0,.32);\";\n      face.appendChild(st);\n      el.appendChild(face);\n      stickers[dir] = st;\n    });\n    const entry = { cube, el, stickers };\n    Array.prototype.forEach.call(el.querySelectorAll(\".face\"), (f) => { f.__entry = entry; });\n    return entry;\n  }\n\n  renderCube() {\n    const U = this.UNIT, H = this.HALF;\n    this.entries.forEach((e) => {\n      const p = e.cube.position;\n      e.el.style.transform = \"translate3d(\" + ((p.X - 1) * U - H) + \"px,\" + ((p.Z - 1) * U - H) + \"px,\" + ((p.Y - 1) * U) + \"px)\";\n      this.DIRS.forEach((dir) => {\n        const col = e.cube.orientation[dir];\n        const st = e.stickers[dir];\n        if (col) { st.style.display = \"block\"; st.style.background = this.COLORS[col]; }\n        else { st.style.display = \"none\"; }\n      });\n    });\n  }\n\n  applyView(animate) {\n    if (!this.worldEl) return;\n    this.worldEl.style.transition = animate ? \"transform .4s cubic-bezier(.2,.6,.2,1)\" : \"none\";\n    this.worldEl.style.transform = \"rotateX(\" + this.pitch + \"deg) rotateY(\" + this.yaw + \"deg)\";\n  }\n\n  // ---------- moves / animation ----------\n  move(face, prime, opts) {\n    if (!this.MOVES[face]) return;\n    this.queue.push({ kind: \"turn\", face, prime: !!prime, opts: opts || {} });\n    this.processQueue();\n  }\n\n  cubeMove(key) {\n    const c = this.CUBE_MOVES[key];\n    if (!c) return;\n    this.queue.push({ kind: \"cube\", c });\n    this.processQueue();\n  }\n\n  orbitStr() { return \"rotateX(\" + this.pitch + \"deg) rotateY(\" + this.yaw + \"deg)\"; }\n\n  processQueue() {\n    if (this.animating || !this.queue.length || !this.worldEl) return;\n    const it = this.queue.shift();\n    if (it.kind === \"cube\") { this.animateCube(it.c); return; }\n    const m = this.MOVES[it.face];\n    const base = this.ANIM_SIGN[m.cssAxis] * 90;\n    const angle = it.prime ? -base : base;\n    const method = it.prime ? m.ccw : m.cw;\n    this.animateLayer(m, angle, method, it.opts);\n  }\n\n  animateCube(c) {\n    this.animating = true;\n    this.worldEl.style.transition = \"transform 320ms cubic-bezier(.34,.66,.24,1)\";\n    this.worldEl.style.transform = this.orbitStr() + \" rotate\" + c.axis + \"(\" + c.angle + \"deg)\";\n    let finished = false;\n    const done = () => {\n      if (finished) return; finished = true;\n      this.rubiks.rotateCube(c.rotation);   // re-key model so the spun look becomes the new resting state\n      this.worldEl.style.transition = \"none\";\n      this.worldEl.style.transform = this.orbitStr();\n      this.renderCube();\n      this.animating = false;\n      this.processQueue();\n    };\n    this.worldEl.addEventListener(\"transitionend\", done, { once: true });\n    setTimeout(done, 470);\n  }\n\n  animateLayer(m, angle, method, opts) {\n    this.animating = true;\n    const group = document.createElement(\"div\");\n    group.style.cssText = \"position:absolute; left:0; top:0; width:0; height:0; transform-style:preserve-3d;\";\n    this.worldEl.appendChild(group);\n    const moving = this.entries.filter((e) => e.cube.position[m.posAxis] === m.layer);\n    moving.forEach((e) => group.appendChild(e.el));\n    group.getBoundingClientRect(); // reflow\n    const dur = opts.fast ? 135 : 290;\n    group.style.transition = \"transform \" + dur + \"ms cubic-bezier(.34,.66,.24,1)\";\n    group.style.transform = \"rotate\" + m.cssAxis + \"(\" + angle + \"deg)\";\n\n    let finished = false;\n    const done = () => {\n      if (finished) return; finished = true;\n      this.rubiks[method]();\n      moving.forEach((e) => this.worldEl.appendChild(e.el));\n      group.remove();\n      this.renderCube();\n      this.afterMove(opts);\n      this.animating = false;\n      this.processQueue();\n    };\n    group.addEventListener(\"transitionend\", done);\n    setTimeout(done, dur + 140);\n  }\n\n  afterMove(opts) {\n    if (opts.scramble) {\n      this.scrambleLeft--;\n      if (this.scrambleLeft <= 0) this.setState({ status: \"ready\" });\n      return;\n    }\n    if (opts.count !== false) {\n      this.startTimer();\n      this.setState((s) => ({ moveCount: s.moveCount + 1 }));\n    }\n    if (this.hasScrambled && window.CubeEngine.isSolved(this.rubiks)) {\n      this.stopTimer();\n      this.setState({ status: \"solved\" });\n    }\n  }\n\n  // ---------- timer ----------\n  startTimer() {\n    if (this.running || this.state.status === \"solved\") return;\n    this.running = true;\n    this.t0 = performance.now();\n    this.setState({ status: \"solving\" });\n    this.timer = setInterval(() => this.setState({ elapsed: performance.now() - this.t0 }), 60);\n  }\n  stopTimer() {\n    if (this.timer) clearInterval(this.timer);\n    this.running = false;\n    if (this.t0) this.setState({ elapsed: performance.now() - this.t0 });\n  }\n\n  // ---------- scramble / reset ----------\n  scramble() {\n    this.doReset(false);\n    this.hasScrambled = true;\n    this.setState({ status: \"scrambling\", moveCount: 0, elapsed: 0 });\n    const faces = [\"U\", \"D\", \"L\", \"R\", \"F\", \"B\"];\n    const seq = []; let lastAxis = \"\";\n    for (let i = 0; i < 24; i++) {\n      let f; let guard = 0;\n      do { f = faces[Math.floor(Math.random() * faces.length)]; guard++; }\n      while (this.MOVES[f].posAxis === lastAxis && guard < 8);\n      lastAxis = this.MOVES[f].posAxis;\n      seq.push({ f, prime: Math.random() < 0.5 });\n    }\n    this.scrambleLeft = seq.length;\n    seq.forEach((mv) => this.move(mv.f, mv.prime, { count: false, fast: true, scramble: true }));\n  }\n\n  reset() { this.doReset(true); }\n\n  doReset(resetView) {\n    if (this.timer) clearInterval(this.timer);\n    this.running = false;\n    this.queue = [];\n    this.animating = false;\n    this.rubiks.reset();\n    if (this.entries && this.worldEl) {\n      // re-parent every cubie to world and drop any leftover turn-group wrappers\n      this.entries.forEach((e) => this.worldEl.appendChild(e.el));\n      Array.prototype.slice.call(this.worldEl.children).forEach((ch) => {\n        if (!this.entries.some((e) => e.el === ch)) ch.remove();\n      });\n      this.renderCube();\n    }\n    if (resetView) { this.hasScrambled = false; this.yaw = -34; this.pitch = -22; this.applyView(true); }\n    this.setState({ status: \"ready\", moveCount: 0, elapsed: 0 });\n  }\n\n  // ---------- view ----------\n  nudge(dPitch, dYaw) {\n    this.pitch = Math.max(-86, Math.min(86, this.pitch + dPitch));\n    this.yaw += dYaw;\n    this.applyView(true);\n  }\n  resetView() { this.yaw = -34; this.pitch = -22; this.applyView(true); }\n\n  // ---------- pointer ----------\n  onDown(e) {\n    this.sceneEl.setPointerCapture && this.sceneEl.setPointerCapture(e.pointerId);\n    this.px = e.clientX; this.py = e.clientY;\n    this.yaw0 = this.yaw; this.pitch0 = this.pitch;\n    this.dragging = true; this.turnCommitted = false;\n    const faceEl = e.target.closest && e.target.closest(\".face\");\n    this.dragFace = (faceEl && !this.animating) ? faceEl : null;\n    this.sceneEl.style.cursor = \"grabbing\";\n  }\n  onMove(e) {\n    if (!this.dragging) return;\n    const dx = e.clientX - this.px, dy = e.clientY - this.py;\n    if (this.dragFace) {\n      if (!this.turnCommitted && Math.hypot(dx, dy) > 14) {\n        this.turnCommitted = true;\n        const mv = this.pickTurn(this.dragFace, dx, dy);\n        if (mv) this.move(mv.face, mv.prime);\n      }\n    } else {\n      this.yaw = this.yaw0 + dx * 0.42;\n      this.pitch = Math.max(-86, Math.min(86, this.pitch0 - dy * 0.42));\n      this.applyView(false);\n    }\n  }\n  onUp(e) {\n    this.dragging = false; this.dragFace = null;\n    this.sceneEl.style.cursor = \"grab\";\n  }\n\n  projectAxis(v) {\n    // position-space vector -> css-space (cssX=X, cssY=Z, cssZ=Y) -> screen via Rx(pitch)Ry(yaw)\n    const a = this.pitch * Math.PI / 180, b = this.yaw * Math.PI / 180;\n    let x = v.X, y = v.Z, z = v.Y;\n    // Ry\n    let x1 = x * Math.cos(b) + z * Math.sin(b);\n    let z1 = -x * Math.sin(b) + z * Math.cos(b);\n    let y1 = y;\n    // Rx\n    let y2 = y1 * Math.cos(a) - z1 * Math.sin(a);\n    return { x: x1, y: y2 };\n  }\n\n  pickTurn(faceEl, dx, dy) {\n    const dir = faceEl.dataset.dir;\n    const entry = faceEl.__entry;\n    if (!entry) return null;\n    const cube = entry.cube;\n    const normal = this.NORMALS[dir];\n    const normalAxis = normal.X ? \"X\" : normal.Y ? \"Y\" : \"Z\";\n    const axes = [\"X\", \"Y\", \"Z\"].filter((a) => a !== normalAxis);\n    let best = null;\n    axes.forEach((axis) => {\n      const vec = { X: 0, Y: 0, Z: 0 }; vec[axis] = 1;\n      const proj = this.projectAxis(vec);\n      const dot = dx * proj.x + dy * proj.y;\n      if (!best || Math.abs(dot) > Math.abs(best.dot)) best = { axis, dot, sign: dot >= 0 ? 1 : -1 };\n    });\n    const m = { X: 0, Y: 0, Z: 0 }; m[best.axis] = best.sign;\n    // r = normal x m\n    const r = {\n      X: normal.Y * m.Z - normal.Z * m.Y,\n      Y: normal.Z * m.X - normal.X * m.Z,\n      Z: normal.X * m.Y - normal.Y * m.X\n    };\n    const rAxis = Math.abs(r.X) > 0.5 ? \"X\" : Math.abs(r.Y) > 0.5 ? \"Y\" : \"Z\";\n    const rSign = r[rAxis] >= 0 ? 1 : -1;\n    const layer = cube.position[rAxis];\n    let face = null;\n    Object.keys(this.MOVES).forEach((k) => {\n      const mv = this.MOVES[k];\n      if (mv.posAxis === rAxis && mv.layer === layer) face = k;\n    });\n    if (!face) return null;\n    const prime = (rSign === this.CW_SIGN[rAxis]) ? false : true;\n    return { face, prime };\n  }\n\n  onKey(e) {\n    const tag = (e.target && e.target.tagName) || \"\";\n    if (/input|textarea|select/i.test(tag)) return;\n    const k = e.key;\n    if (k === \"ArrowLeft\") { this.cubeMove(\"spinLeft\"); e.preventDefault(); return; }\n    if (k === \"ArrowRight\") { this.cubeMove(\"spinRight\"); e.preventDefault(); return; }\n    if (k === \"ArrowUp\") { this.cubeMove(\"rollUp\"); e.preventDefault(); return; }\n    if (k === \"ArrowDown\") { this.cubeMove(\"rollDown\"); e.preventDefault(); return; }\n    const map = { u: \"U\", d: \"D\", l: \"L\", r: \"R\", f: \"F\", b: \"B\", m: \"M\", e: \"E\", s: \"S\" };\n    const face = map[k.toLowerCase()];\n    if (face) { this.move(face, e.shiftKey); e.preventDefault(); }\n  }\n\n  // ---------- derived ----------\n  timeText() {\n    const ms = this.state.elapsed || 0;\n    const total = ms / 1000;\n    const mm = Math.floor(total / 60);\n    const ss = Math.floor(total % 60);\n    const t = Math.floor((ms % 1000) / 100);\n    const ssStr = (mm > 0 && ss < 10 ? \"0\" : \"\") + ss;\n    return (mm > 0 ? mm + \":\" : \"\") + ssStr + \".\" + t;\n  }\n\n  renderVals() {\n    const status = this.state.status;\n    const statusMap = {\n      ready:      { label: \"Ready\", color: \"#9AE4FF\", bg: \"rgba(154,228,255,.07)\", border: \"#1d4763\" },\n      scrambling: { label: \"Scrambling\\u2026\", color: \"#F5543A\", bg: \"rgba(245,84,58,.10)\", border: \"#5e2a23\" },\n      solving:    { label: \"Solving\\u2026\", color: \"#16A3D6\", bg: \"rgba(22,163,214,.10)\", border: \"#155a78\" },\n      solved:     { label: \"Solved!\", color: \"#1FA85B\", bg: \"rgba(31,168,91,.12)\", border: \"#1b5a3c\" }\n    };\n    const st = statusMap[status] || statusMap.ready;\n\n    return {\n      setSceneEl: this.setSceneEl,\n      moveCount: this.state.moveCount,\n      timeText: this.timeText(),\n      statusLabel: st.label, statusColor: st.color, statusBg: st.bg, statusBorder: st.border,\n      scramble: () => this.scramble(),\n      reset: () => this.reset(),\n      resetView: () => this.resetView(),\n      spinLeft: () => this.cubeMove(\"spinLeft\"),\n      spinRight: () => this.cubeMove(\"spinRight\"),\n      rollUp: () => this.cubeMove(\"rollUp\"),\n      rollDown: () => this.cubeMove(\"rollDown\")\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
