<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Cube</title>
  </head>
  <body>
    <main class="app">
      <section class="net" aria-label="Cube net">
        <div class="face-wrap area-top">
          <span class="face-label">Top</span>
          <div id="top-face" class="face">
            <div class="cube" data-position="1" data-orientation="top"></div>
            <div class="cube" data-position="2" data-orientation="top"></div>
            <div class="cube" data-position="3" data-orientation="top"></div>
            <div class="cube" data-position="4" data-orientation="top"></div>
            <div class="cube" data-position="5" data-orientation="top"></div>
            <div class="cube" data-position="6" data-orientation="top"></div>
            <div class="cube" data-position="7" data-orientation="top"></div>
            <div class="cube" data-position="8" data-orientation="top"></div>
            <div class="cube" data-position="9" data-orientation="top"></div>
          </div>
        </div>

        <div class="face-wrap area-left">
          <span class="face-label">Left</span>
          <div id="left-face" class="face">
            <div class="cube" data-position="1" data-orientation="left"></div>
            <div class="cube" data-position="4" data-orientation="left"></div>
            <div class="cube" data-position="7" data-orientation="left"></div>
            <div class="cube" data-position="10" data-orientation="left"></div>
            <div class="cube" data-position="13" data-orientation="left"></div>
            <div class="cube" data-position="16" data-orientation="left"></div>
            <div class="cube" data-position="19" data-orientation="left"></div>
            <div class="cube" data-position="22" data-orientation="left"></div>
            <div class="cube" data-position="25" data-orientation="left"></div>
          </div>
        </div>

        <div class="face-wrap area-front">
          <span class="face-label">Front</span>
          <div id="front-face" class="face">
            <div class="cube" data-position="7" data-orientation="front"></div>
            <div class="cube" data-position="8" data-orientation="front"></div>
            <div class="cube" data-position="9" data-orientation="front"></div>
            <div class="cube" data-position="16" data-orientation="front"></div>
            <div class="cube" data-position="17" data-orientation="front"></div>
            <div class="cube" data-position="18" data-orientation="front"></div>
            <div class="cube" data-position="25" data-orientation="front"></div>
            <div class="cube" data-position="26" data-orientation="front"></div>
            <div class="cube" data-position="27" data-orientation="front"></div>
          </div>
        </div>

        <div class="face-wrap area-right">
          <span class="face-label">Right</span>
          <div id="right-face" class="face">
            <div class="cube" data-position="9" data-orientation="right"></div>
            <div class="cube" data-position="6" data-orientation="right"></div>
            <div class="cube" data-position="3" data-orientation="right"></div>
            <div class="cube" data-position="18" data-orientation="right"></div>
            <div class="cube" data-position="15" data-orientation="right"></div>
            <div class="cube" data-position="12" data-orientation="right"></div>
            <div class="cube" data-position="27" data-orientation="right"></div>
            <div class="cube" data-position="24" data-orientation="right"></div>
            <div class="cube" data-position="21" data-orientation="right"></div>
          </div>
        </div>

        <div class="face-wrap area-back">
          <span class="face-label">Back</span>
          <div id="back-face" class="face">
            <div class="cube" data-position="3" data-orientation="back"></div>
            <div class="cube" data-position="2" data-orientation="back"></div>
            <div class="cube" data-position="1" data-orientation="back"></div>
            <div class="cube" data-position="12" data-orientation="back"></div>
            <div class="cube" data-position="11" data-orientation="back"></div>
            <div class="cube" data-position="10" data-orientation="back"></div>
            <div class="cube" data-position="21" data-orientation="back"></div>
            <div class="cube" data-position="20" data-orientation="back"></div>
            <div class="cube" data-position="19" data-orientation="back"></div>
          </div>
        </div>

        <div class="face-wrap area-bottom">
          <span class="face-label">Bottom</span>
          <div id="bottom-face" class="face">
            <div
              class="cube"
              data-position="25"
              data-orientation="bottom"
            ></div>
            <div
              class="cube"
              data-position="26"
              data-orientation="bottom"
            ></div>
            <div
              class="cube"
              data-position="27"
              data-orientation="bottom"
            ></div>
            <div
              class="cube"
              data-position="22"
              data-orientation="bottom"
            ></div>
            <div
              class="cube"
              data-position="23"
              data-orientation="bottom"
            ></div>
            <div
              class="cube"
              data-position="24"
              data-orientation="bottom"
            ></div>
            <div
              class="cube"
              data-position="19"
              data-orientation="bottom"
            ></div>
            <div
              class="cube"
              data-position="20"
              data-orientation="bottom"
            ></div>
            <div
              class="cube"
              data-position="21"
              data-orientation="bottom"
            ></div>
          </div>
        </div>
      </section>

      <section class="controls-grid" aria-label="Rotation controls">
        <div class="control-group group-x">
          <h2>X Axis</h2>
          <div class="btn-grid">
            <button id="rotateTopCW">
              Top <span class="dir">&#8634;</span>
            </button>
            <button id="rotateTopCCW">
              Top <span class="dir">&#8635;</span>
            </button>
            <button id="rotateXMidCW">
              Mid <span class="dir">&#8634;</span>
            </button>
            <button id="rotateXMidCCW">
              Mid <span class="dir">&#8635;</span>
            </button>
            <button id="rotateBottomCW">
              Bottom <span class="dir">&#8634;</span>
            </button>
            <button id="rotateBottomCCW">
              Bottom <span class="dir">&#8635;</span>
            </button>
          </div>
        </div>

        <div class="control-group group-y">
          <h2>Y Axis</h2>
          <div class="btn-grid">
            <button id="rotateLeftCW">
              Left <span class="dir">&#8593;</span>
            </button>
            <button id="rotateLeftCCW">
              Left <span class="dir">&#8595;</span>
            </button>
            <button id="rotateYMidCW">
              Mid <span class="dir">&#8593;</span>
            </button>
            <button id="rotateYMidCCW">
              Mid <span class="dir">&#8595;</span>
            </button>
            <button id="rotateRightCW">
              Right <span class="dir">&#8593;</span>
            </button>
            <button id="rotateRightCCW">
              Right <span class="dir">&#8595;</span>
            </button>
          </div>
        </div>

        <div class="control-group group-z">
          <h2>Z Axis</h2>
          <div class="btn-grid">
            <button id="rotateFrontCW">
              Front <span class="dir">&#8635;</span>
            </button>
            <button id="rotateFrontCCW">
              Front <span class="dir">&#8634;</span>
            </button>
            <button id="rotateZMidCW">
              Mid <span class="dir">&#8635;</span>
            </button>
            <button id="rotateZMidCCW">
              Mid <span class="dir">&#8634;</span>
            </button>
            <button id="rotateBackCW">
              Back <span class="dir">&#8635;</span>
            </button>
            <button id="rotateBackCCW">
              Back <span class="dir">&#8634;</span>
            </button>
          </div>
        </div>

        <div class="control-group group-cube">
          <h2>Whole Cube</h2>
          <div class="btn-grid">
            <button id="rotateCubeXCW">
              X <span class="dir">&#8634;</span>
            </button>
            <button id="rotateCubeXCCW">
              X <span class="dir">&#8635;</span>
            </button>
            <button id="rotateCubeYCW">
              Y <span class="dir">&#8593;</span>
            </button>
            <button id="rotateCubeYCCW">
              Y <span class="dir">&#8595;</span>
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
  <script src="./app.js"></script>
</html>
