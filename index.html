<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Cube</title>
</head>
<body>
    <div id="faces" class="d-flex-column">
        <div id="top-face" class="face">
            TOP FACE
        </div>
        <div id="middle-faces" class="d-flex">
            <div id="left-face" class="face">
                LEFT FACE
            </div>
            <div id="front-face" class="face">
                FRONT FACE
            </div>
            <div id="right-face" class="face">
                RIGHT FACE
            </div>
        </div>
        <div id="bottom-face" class="face">
            BOTTOM FACE
        </div>
    </div>
</body>
<script src="./app.js"></script>
</html>
